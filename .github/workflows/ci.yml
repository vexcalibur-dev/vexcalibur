name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_live_osv:
        description: "Run live OSV compatibility checks"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 9 * * *"

permissions: read-all

env:
  MAX_PYTHON: "3.14"
  POETRY_CACHE_DIR: /tmp/poetry-cache
  PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
  XDG_CACHE_HOME: /tmp/vexcalibur-cache

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.MAX_PYTHON }}
          cache: poetry

      - name: Install dependencies
        run: poetry install

      - name: Check package metadata
        run: poetry check

      - name: Check lock file
        run: poetry check --lock

      - name: Check formatting
        run: poetry run ruff format --check src tests

      - name: Lint
        run: poetry run ruff check src tests

      - name: Type check
        run: poetry run mypy src

      - name: Audit Python dependencies
        run: poetry run pip-audit --cache-dir /tmp/vexcalibur-pip-audit-cache

      - name: Scan for secrets
        run: poetry run detect-secrets scan --baseline .secrets.baseline

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry

      - name: Install dependencies
        run: poetry install

      - name: Run offline tests
        run: poetry run pytest -m "not live" --cov-fail-under=75

      - name: Upload coverage XML
        if: matrix.python-version == env.MAX_PYTHON
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  build:
    name: Build package
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.MAX_PYTHON }}
          cache: poetry

      - name: Build distributions
        run: poetry build

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 14

  live-osv:
    name: Live OSV compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_live_osv)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.MAX_PYTHON }}
          cache: poetry

      - name: Install dependencies
        run: poetry install

      - name: Run live OSV compatibility tests
        run: poetry run pytest -m live -q

  ci:
    name: CI result
    runs-on: ubuntu-latest
    needs: [quality, test, build]
    if: always() && github.event_name != 'schedule'
    steps:
      - name: Check required jobs
        run: |
          for result in "${{ needs.quality.result }}" "${{ needs.test.result }}" "${{ needs.build.result }}"; do
            if [ "$result" != "success" ]; then
              echo "Required job failed or was skipped: $result"
              exit 1
            fi
          done
