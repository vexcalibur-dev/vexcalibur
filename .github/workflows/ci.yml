name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_scheduled_profile:
        description: "Run the scheduled CI profile, including live external-service compatibility"
        required: false
        default: false
        type: boolean
      run_live_services:
        description: "Run live external-service compatibility checks"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: read

env:
  MAX_PYTHON: "3.14"
  UV_CACHE_DIR: /tmp/vexcalibur-uv-cache
  XDG_CACHE_HOME: /tmp/vexcalibur-cache

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check lock file
        run: uv lock --check

      - name: Check formatting
        run: uv run --frozen ruff format --check src tests scripts/*.py docs/conf.py

      - name: Lint
        run: uv run --frozen ruff check src tests scripts/*.py docs/conf.py

      - name: Type check
        run: uv run --frozen mypy src

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install workflow tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: "v2026.6.12"
          github_token: ""
          cache: true
          install_args: "actionlint shellcheck"

      - name: Lint workflows
        run: actionlint -shellcheck shellcheck .github/workflows/*.yml

      - name: Lint shell scripts
        run: shellcheck scripts/*.sh

  security:
    name: Repository security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Audit Python dependencies
        run: uv run --frozen pip-audit --cache-dir /tmp/vexcalibur-pip-audit-cache

      - name: Scan pull request for secrets
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "/repos/${GITHUB_REPOSITORY}/contents/.secrets.baseline?ref=${BASE_SHA}" --jq .content \
            | base64 --decode > /tmp/base.secrets.baseline
          git ls-files -z -- . ':(exclude).secrets.baseline' \
            | xargs -0 uv run --frozen detect-secrets-hook --baseline /tmp/base.secrets.baseline --

      - name: Scan pushed code for secrets
        if: github.event_name != 'pull_request'
        run: git ls-files -z | xargs -0 uv run --frozen detect-secrets-hook --baseline .secrets.baseline --

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run offline tests
        run: uv run --frozen pytest -m "not live and not fuzz" --cov-fail-under=75

      - name: Upload coverage XML
        if: matrix.python-version == env.MAX_PYTHON
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  fuzz-smoke:
    name: Parser fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Install locked property-test dependencies
        run: uv sync --frozen

      - name: Run deterministic parser properties
        run: make fuzz-smoke

  build:
    name: Build package
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Build distributions
        run: uv build --clear --no-create-gitignore --no-sources

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 14

  installed-cli:
    name: Installed CLI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Select wheel
        id: wheel
        run: |
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name "*.whl" | sort)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "Expected exactly one wheel in dist, found ${#wheels[@]}" >&2
            exit 2
          fi
          printf 'path=%s\n' "${wheels[0]}" >> "$GITHUB_OUTPUT"

      - name: Run installed CLI checks
        env:
          VEXCALIBUR_WHEEL: ${{ steps.wheel.outputs.path }}
        run: make installed-cli-check

  openvex-interoperability:
    name: OpenVEX interoperability
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: tests/integration/openvex-go/go.mod
          cache-dependency-path: tests/integration/openvex-go/go.sum

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Parse the OpenVEX golden with go-vex
        run: make openvex-interop

      - name: Parse installed-wheel output with go-vex
        run: |
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name "*.whl" | sort)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "Expected exactly one wheel in dist, found ${#wheels[@]}" >&2
            exit 2
          fi

          uv venv /tmp/vexcalibur-openvex-interop
          uv pip install --python /tmp/vexcalibur-openvex-interop/bin/python "${wheels[0]}"
          /tmp/vexcalibur-openvex-interop/bin/vexcalibur generate \
            tests/fixtures/sbom/cyclonedx-json-simple.json \
            --findings-file tests/fixtures/findings/all-analysis-states.json \
            --offline \
            --format openvex \
            --author "Vexcalibur interoperability test" \
            --timestamp 2026-06-23T00:00:00Z \
            --output /tmp/vexcalibur-openvex-interop.json
          go -C tests/integration/openvex-go run . /tmp/vexcalibur-openvex-interop.json

  csaf-conformance:
    name: CSAF 2.0 conformance
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.14.1"
          cache: npm
          cache-dependency-path: tests/integration/csaf-validator/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Install pinned CSAF validator
        run: make csaf-validator-install

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Validate checked-in CSAF golden
        run: make csaf-interop

      - name: Select wheel
        id: wheel
        run: |
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name "*.whl" | sort)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "Expected exactly one wheel in dist, found ${#wheels[@]}" >&2
            exit 2
          fi
          printf 'path=%s\n' "${wheels[0]}" >> "$GITHUB_OUTPUT"

      - name: Validate installed-wheel CSAF output
        env:
          VEXCALIBUR_WHEEL: ${{ steps.wheel.outputs.path }}
        run: make installed-csaf-check

  release-evidence:
    name: Release evidence fixture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: tests/integration/openvex-go/go.mod
          cache-dependency-path: tests/integration/openvex-go/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.14.1"
          cache: npm
          cache-dependency-path: tests/integration/csaf-validator/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Install locked Python validation dependencies
        run: uv sync --frozen

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Select wheel
        id: wheel
        run: |
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name "*.whl" | sort)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "Expected exactly one wheel in dist, found ${#wheels[@]}" >&2
            exit 2
          fi
          printf 'path=%s\n' "${wheels[0]}" >> "$GITHUB_OUTPUT"

      - name: Generate and validate release-evidence fixtures
        env:
          VEXCALIBUR_WHEEL: ${{ steps.wheel.outputs.path }}
        run: make release-evidence-check

  publication-contract:
    name: Immutable publication contract
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/release-validation.yml
    with:
      release-sha: ${{ github.sha }}
      release-tag: v0.0.0
      release-version: 0.0.0
      publication-only: true
      synthetic-ci-version: true

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra docs

      - name: Build documentation
        run: make docs

  live-services:
    name: Live external-service compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.run_scheduled_profile || inputs.run_live_services))
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run live external-service compatibility tests
        run: uv run --frozen pytest -m live -q

  ci:
    name: CI result
    runs-on: ubuntu-latest
    needs: [quality, workflow-lint, security, test, fuzz-smoke, build, installed-cli, openvex-interoperability, csaf-conformance, release-evidence, publication-contract, docs]
    if: always() && github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Check required jobs
        run: |
          for result in "${{ needs.quality.result }}" "${{ needs.workflow-lint.result }}" "${{ needs.security.result }}" "${{ needs.test.result }}" "${{ needs.fuzz-smoke.result }}" "${{ needs.build.result }}" "${{ needs.installed-cli.result }}" "${{ needs.openvex-interoperability.result }}" "${{ needs.csaf-conformance.result }}" "${{ needs.release-evidence.result }}" "${{ needs.publication-contract.result }}" "${{ needs.docs.result }}"; do
            if [ "$result" != "success" ]; then
              echo "Required job failed or was skipped: $result"
              exit 1
            fi
          done
