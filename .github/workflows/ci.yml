name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_scheduled_profile:
        description: "Run the scheduled CI profile, including live OSV compatibility"
        required: false
        default: false
        type: boolean
      run_live_osv:
        description: "Run live OSV compatibility checks"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: read

env:
  MAX_PYTHON: "3.14"
  UV_CACHE_DIR: /tmp/vexcalibur-uv-cache
  XDG_CACHE_HOME: /tmp/vexcalibur-cache

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check lock file
        run: uv lock --check

      - name: Check formatting
        run: uv run --frozen ruff format --check src tests docs/conf.py

      - name: Lint
        run: uv run --frozen ruff check src tests docs/conf.py

      - name: Type check
        run: uv run --frozen mypy src

  security:
    name: Repository security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Audit Python dependencies
        run: uv run --frozen pip-audit --cache-dir /tmp/vexcalibur-pip-audit-cache

      - name: Scan pull request for secrets
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "/repos/${GITHUB_REPOSITORY}/contents/.secrets.baseline?ref=${BASE_SHA}" --jq .content \
            | base64 --decode > /tmp/base.secrets.baseline
          git ls-files -z | xargs -0 uv run --frozen detect-secrets-hook --baseline /tmp/base.secrets.baseline --

      - name: Scan pushed code for secrets
        if: github.event_name != 'pull_request'
        run: git ls-files -z | xargs -0 uv run --frozen detect-secrets-hook --baseline .secrets.baseline --

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run offline tests
        run: uv run --frozen pytest -m "not live" --cov-fail-under=75

      - name: Upload coverage XML
        if: matrix.python-version == env.MAX_PYTHON
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  build:
    name: Build package
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Build distributions
        run: uv build --clear --no-create-gitignore --no-sources

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 14

  installed-cli:
    name: Installed CLI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Select wheel
        id: wheel
        run: |
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name "*.whl" | sort)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "Expected exactly one wheel in dist, found ${#wheels[@]}" >&2
            exit 2
          fi
          printf 'path=%s\n' "${wheels[0]}" >> "$GITHUB_OUTPUT"

      - name: Run installed CLI checks
        env:
          VEXCALIBUR_WHEEL: ${{ steps.wheel.outputs.path }}
        run: make installed-cli-check

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra docs

      - name: Build documentation
        run: make docs

  live-osv:
    name: Live OSV compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.run_scheduled_profile || inputs.run_live_osv))
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run live OSV compatibility tests
        run: uv run --frozen pytest -m live -q

  ci:
    name: CI result
    runs-on: ubuntu-latest
    needs: [quality, security, test, build, installed-cli, docs]
    if: always() && github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.run_scheduled_profile)
    steps:
      - name: Check required jobs
        run: |
          for result in "${{ needs.quality.result }}" "${{ needs.security.result }}" "${{ needs.test.result }}" "${{ needs.build.result }}" "${{ needs.installed-cli.result }}" "${{ needs.docs.result }}"; do
            if [ "$result" != "success" ]; then
              echo "Required job failed or was skipped: $result"
              exit 1
            fi
          done
