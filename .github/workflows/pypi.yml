name: PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Refuse prerelease publishing
        if: github.event.release.prerelease
        run: |
          echo "::error::PyPI publishing requires a non-prerelease GitHub Release."
          exit 1

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - name: Require automation release author
        env:
          AUTOMATION_BOT_LOGIN: vexcalibur-dev-automation[bot]
          RELEASE_AUTHOR: ${{ github.event.release.author.login }}
        run: |
          if [[ "$RELEASE_AUTHOR" != "$AUTOMATION_BOT_LOGIN" ]]; then
            echo "::error::PyPI publishes must come from ${AUTOMATION_BOT_LOGIN}, not ${RELEASE_AUTHOR}."
            exit 1
          fi

      - name: Resolve tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag="$RELEASE_TAG"

          if ! printf '%s\n' "$tag" | grep -Eq '^v(0|[1-9][0-9]*)[.](0|[1-9][0-9]*)[.](0|[1-9][0-9]*)$'; then
            echo "::error::Release tag must look like v0.1.0 without leading zeros: $tag"
            exit 1
          fi

          sha="$(git rev-parse --verify "refs/tags/$tag^{commit}")"
          current_main_sha="$(git rev-parse --verify origin/main)"
          if [[ "$sha" != "$current_main_sha" ]]; then
            echo "::error::Release tag $tag points at $sha, not current main $current_main_sha."
            exit 1
          fi

          {
            printf 'tag=%s\n' "$tag"
            printf 'sha=%s\n' "$sha"
            printf 'version=%s\n' "${tag#v}"
          } >> "$GITHUB_OUTPUT"

  validation:
    name: Release validation
    needs: resolve
    permissions:
      contents: read
    uses: ./.github/workflows/release-validation.yml
    with:
      release-sha: ${{ needs.resolve.outputs.sha }}
      release-tag: ${{ needs.resolve.outputs.tag }}
      release-version: ${{ needs.resolve.outputs.version }}

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - resolve
      - validation
    environment:
      name: pypi
      url: https://pypi.org/p/vexcalibur
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Re-resolve validated release tag
        env:
          EXPECTED_SHA: ${{ needs.validation.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validation.outputs.tag }}
        run: |
          set -euo pipefail

          read -r object_type object_sha < <(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
              --jq '[.object.type, .object.sha] | @tsv'
          )

          tag_depth=0
          while [[ "${object_type}" == "tag" ]]; do
            tag_depth=$((tag_depth + 1))
            if ((tag_depth > 8)); then
              echo "::error::Release tag ${RELEASE_TAG} has excessive indirection."
              exit 1
            fi
            read -r object_type object_sha < <(
              gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}" \
                --jq '[.object.type, .object.sha] | @tsv'
            )
          done

          if [[ "${object_type}" != "commit" ]]; then
            echo "::error::Release tag ${RELEASE_TAG} does not resolve to a commit."
            exit 1
          fi

          current_main_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha'
          )"
          if [[ "${object_sha}" != "${EXPECTED_SHA}" ]]; then
            echo "::error::Release tag ${RELEASE_TAG} moved after validation."
            exit 1
          fi
          if [[ "${current_main_sha}" != "${EXPECTED_SHA}" ]]; then
            echo "::error::Main moved after release validation."
            exit 1
          fi

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
