name: PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  MAX_PYTHON: "3.14"
  UV_CACHE_DIR: /tmp/vexcalibur-uv-cache
  XDG_CACHE_HOME: /tmp/vexcalibur-cache

jobs:
  resolve:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - name: Resolve tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag="$RELEASE_TAG"

          if ! printf '%s\n' "$tag" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+$'; then
            echo "::error::Release tag must look like v0.1.0: $tag"
            exit 1
          fi

          sha="$(git rev-parse --verify "refs/tags/$tag^{commit}")"
          if ! git merge-base --is-ancestor "$sha" origin/main; then
            echo "::error::Release tag $tag is not on origin/main."
            exit 1
          fi

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'sha=%s\n' "$sha" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${tag#v}" >> "$GITHUB_OUTPUT"

  quality:
    name: Quality
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check lock file
        run: uv lock --check

      - name: Check formatting
        run: uv run --frozen ruff format --check src tests docs/conf.py

      - name: Lint
        run: uv run --frozen ruff check src tests docs/conf.py

      - name: Type check
        run: uv run --frozen mypy src

  security:
    name: Repository security
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Audit Python dependencies
        run: uv run --frozen pip-audit --cache-dir /tmp/vexcalibur-pip-audit-cache

      - name: Scan code for secrets
        run: git ls-files -z | xargs -0 uv run --frozen detect-secrets-hook --baseline .secrets.baseline --

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run offline tests
        run: uv run --frozen pytest -m "not live" --cov-fail-under=75

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra docs

      - name: Build documentation
        run: make docs

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: resolve
    outputs:
      tag: ${{ needs.resolve.outputs.tag }}
      sha: ${{ needs.resolve.outputs.sha }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ env.MAX_PYTHON }}

      - name: Build distributions
        run: uv build --clear --no-create-gitignore --no-sources

      - name: Verify built versions match tag
        id: version
        env:
          EXPECTED_VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          python scripts/verify-dist-metadata.py dist \
            --expected-name vexcalibur \
            --expected-version "$EXPECTED_VERSION" \
            --github-output "$GITHUB_OUTPUT"

      - name: Check distributions
        run: uv run --frozen twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 14

  installed-cli:
    name: Installed CLI (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.build.outputs.sha }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version-file: .tool-versions
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Verify downloaded distributions
        id: dist
        env:
          EXPECTED_VERSION: ${{ needs.build.outputs.version }}
        run: |
          python scripts/verify-dist-metadata.py dist \
            --expected-name vexcalibur \
            --expected-version "$EXPECTED_VERSION" \
            --github-output "$GITHUB_OUTPUT"

      - name: Run installed CLI checks
        env:
          VEXCALIBUR_EXPECTED_VERSION: ${{ needs.build.outputs.version }}
          VEXCALIBUR_WHEEL: ${{ steps.dist.outputs.wheel }}
        run: make installed-cli-check

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - quality
      - security
      - test
      - docs
      - build
      - installed-cli
    environment:
      name: pypi
      url: https://pypi.org/p/vexcalibur
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d # v1.14.0
